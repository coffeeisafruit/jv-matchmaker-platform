<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Architecture · Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf8f5;
            --ink: #1a1a1a;
            --forest: #1e3a2f;
            --gold: #c9a962;
            --muted: #8b8680;
            --card: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container { max-width: 380px; width: 100%; }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 26px;
            font-weight: 500;
            color: var(--forest);
            text-align: center;
            margin-bottom: 6px;
        }
        p.subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--forest);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0dbd4;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: var(--cream);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="password"]:focus { border-color: var(--gold); }
        .error {
            color: #c0392b;
            font-size: 13px;
            margin-top: 8px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: var(--forest);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2a4f40; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Platform Architecture</h1>
        <p class="subtitle">Internal access only</p>
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <label for="password">Access Password</label>
                <input type="password" id="password" name="password" autofocus placeholder="Enter password">
                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
                <button type="submit">View Architecture</button>
            </form>
        </div>
    </div>
</body>
</html>
